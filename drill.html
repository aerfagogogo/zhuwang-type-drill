<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>惩罚 · 主网竞赛</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #1a1b1e;
  --surface: #25262b;
  --border:  #373a40;
  --text:    #c1c2c5;
  --dim:     #5c5f66;
  --accent:  #4dabf7;
  --ok:      #51cf66;
  --err:     #ff6b6b;
  --comment: #6b7280;
  --cmd:     #e5e7eb;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 24px; }

/* Header */
.header { max-width: 720px; margin: 0 auto 28px; }
.qid-badge {
  display: inline-block;
  font-size: 11px; font-weight: 600; letter-spacing: .6px;
  padding: 2px 8px; border-radius: 4px;
  background: rgba(77,171,247,.12); color: var(--accent);
  border: 1px solid rgba(77,171,247,.25);
  margin-bottom: 8px;
}
.q-title { font-size: 18px; font-weight: 600; color: #f1f3f5; margin-bottom: 6px; }
.q-scene {
  font-size: 13px; color: var(--dim); line-height: 1.6;
  font-family: -apple-system, sans-serif;
  border-left: 2px solid var(--border); padding-left: 10px;
}

/* Drill area */
.drill-wrap { max-width: 720px; margin: 0 auto; }
.drill-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 20px;
}

.line-row {
  display: flex; align-items: baseline;
  padding: 3px 0; line-height: 1.7;
}
.line-row.comment .line-text {
  color: var(--comment); font-size: 13px; font-style: italic;
}
.line-row.command .line-text { font-size: 14px; }
.line-row.blank { height: 10px; }

/* Typed characters */
.char { position: relative; }
.char.done  { color: var(--ok); }
.char.cur   { background: var(--accent); color: var(--bg); border-radius: 2px; }
.char.wrong { background: var(--err);    color: #fff;      border-radius: 2px; animation: shake .15s; }
.char.pending { color: var(--cmd); opacity: .45; }
.line-row.future .char { opacity: .3; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  33%      { transform: translateX(-3px); }
  66%      { transform: translateX(3px); }
}

/* Prompt prefix */
.prompt { color: var(--accent); margin-right: 6px; font-size: 13px; user-select: none; }

/* Progress bar */
.progress-bar {
  max-width: 720px; margin: 0 auto 20px;
  height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
}
.progress-fill { height: 100%; background: var(--accent); transition: width .2s; border-radius: 2px; }

/* Footer stats */
.stats {
  max-width: 720px; margin: 0 auto;
  display: flex; gap: 24px; font-size: 12px; color: var(--dim);
}
.stats span { display: flex; align-items: center; gap: 4px; }
.stats .val { color: var(--text); font-weight: 600; }

/* Done overlay */
.done-msg {
  display: none; text-align: center; padding: 40px 20px;
}
.done-msg.show { display: block; }
.done-msg .trophy { font-size: 48px; margin-bottom: 12px; }
.done-msg h2 { font-size: 22px; color: var(--ok); margin-bottom: 8px; }
.done-msg p  { color: var(--dim); font-size: 14px; }
.done-msg button {
  margin-top: 20px; padding: 8px 20px;
  background: rgba(77,171,247,.12); border: 1px solid rgba(77,171,247,.3);
  color: var(--accent); border-radius: 6px; cursor: pointer; font-size: 14px;
  font-family: inherit;
}
.done-msg button:hover { background: rgba(77,171,247,.2); }

/* Error banner */
.err-banner {
  display: none; max-width: 720px; margin: 0 auto 20px;
  background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.3);
  color: var(--err); border-radius: 8px; padding: 12px 16px; font-size: 14px;
}
.err-banner.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="qid-badge" id="qidBadge">…</div>
  <div class="q-title"  id="qTitle">加载中…</div>
  <div class="q-scene"  id="qScene"></div>
</div>

<div class="err-banner" id="errBanner"></div>

<div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>

<div class="drill-wrap" id="drillWrap">
  <div class="done-msg" id="doneMsg">
    <div class="trophy">🎯</div>
    <h2>完成！</h2>
    <p id="doneStats"></p>
    <button onclick="restart()">再练一遍</button>
  </div>
</div>

<div class="stats">
  <span>命令 <span class="val" id="statDone">0</span>/<span class="val" id="statTotal">-</span></span>
  <span>错误 <span class="val" id="statErr">0</span></span>
  <span>进度 <span class="val" id="statPct">0%</span></span>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────
let lines = [];      // [{type:'comment'|'command'|'blank', text:'...'}]
let cmdLines = [];   // indices of command lines in lines[]
let curCmd = 0;      // index into cmdLines[]
let curChar = 0;     // char index within current command
let totalErrors = 0;
let startTime = null;

// ─── Data loading ────────────────────────────────────────────────
async function loadQuestion(qid) {
  let data;
  try {
    const r = await fetch('exam_data.json?_t=' + Date.now());
    data = await r.json();
  } catch(e) {
    showError('无法加载 exam_data.json: ' + e.message); return;
  }

  // 2026-05-18 大重构后：qid 现在是全局编号（如 "78"），向后兼容旧 {学科}-NNN 格式
  // exam_data.json 新 schema 下题字段含 编号，旧字段 id 已废弃
  const targetNo = /^\d+$/.test(qid) ? parseInt(qid, 10) : null;

  let found = null;
  for (const subj of (data.subjects || [])) {
    for (const sec of (subj.sections || [])) {
      for (const kp of (sec.kps || [])) {
        for (const q of (kp.questions || [])) {
          // 新风格：按 编号 匹配
          if (targetNo !== null && q['编号'] === targetNo) { found = q; break; }
          // 旧风格兼容：按 id 匹配（如果 exam_data 还有 id 字段）
          if (q.id === qid) { found = q; break; }
        }
        if (found) break;
      }
      if (found) break;
    }
    if (found) break;
  }

  if (!found) {
    showError(`找不到题目 [${qid}]，请确认 exam_data.json 已更新。`);
    return;
  }

  // Fill header
  const idDisplay = found['编号'] !== undefined ? `#${found['编号']}` : (found.id || qid);
  document.getElementById('qidBadge').textContent = idDisplay;
  document.getElementById('qTitle').textContent   = found.title || idDisplay;
  document.getElementById('qScene').textContent   = (found['题面'] || '').replace(/`/g, '');

  // Parse answer
  const raw = found['标答'] || found['答案'] || '';
  lines = parseAnswer(raw);
  buildDrill();
}

// ─── Parse ────────────────────────────────────────────────────────
function parseAnswer(raw) {
  // Extract code blocks ```...```
  const blocks = [];
  const re = /```(?:\w+)?\n([\s\S]*?)```/g;
  let m;
  while ((m = re.exec(raw)) !== null) blocks.push(m[1]);
  const src = blocks.length ? blocks.join('\n\n') : raw;

  return src.split('\n').map(line => {
    const t = line.trim();
    if (!t) return { type: 'blank', text: '' };
    if (t.startsWith('#')) return { type: 'comment', text: t };
    return { type: 'command', text: t };
  });
}

// ─── Build DOM ────────────────────────────────────────────────────
function buildDrill() {
  const wrap = document.getElementById('drillWrap');
  wrap.innerHTML = '';

  // Done message
  const done = document.createElement('div');
  done.className = 'done-msg'; done.id = 'doneMsg';
  done.innerHTML = '<div class="trophy">🎯</div><h2>完成！</h2><p id="doneStats"></p>' +
    '<button onclick="restart()">再练一遍</button>';
  wrap.appendChild(done);

  const block = document.createElement('div');
  block.className = 'drill-block'; block.id = 'drillBlock';

  cmdLines = [];
  lines.forEach((line, li) => {
    const row = document.createElement('div');
    row.className = 'line-row ' + line.type;
    row.id = 'line-' + li;

    if (line.type === 'blank') { block.appendChild(row); return; }

    if (line.type === 'comment') {
      const span = document.createElement('span');
      span.className = 'line-text';
      span.textContent = line.text;
      row.appendChild(span);
    } else {
      // command
      const cmdIdx = cmdLines.length;
      cmdLines.push(li);
      const prompt = document.createElement('span');
      prompt.className = 'prompt'; prompt.textContent = '$';
      row.appendChild(prompt);
      const textSpan = document.createElement('span');
      textSpan.className = 'line-text'; textSpan.id = 'cmd-' + cmdIdx;
      // Render chars
      textSpan.innerHTML = line.text.split('').map((c, ci) =>
        `<span class="char pending" id="c-${cmdIdx}-${ci}">${c === ' ' ? '&nbsp;' : escH(c)}</span>`
      ).join('');
      row.appendChild(textSpan);
      // Future rows start dimmed
      if (cmdIdx > 0) row.classList.add('future');
    }
    block.appendChild(row);
  });

  wrap.appendChild(block);

  // Stats init
  document.getElementById('statTotal').textContent = cmdLines.length;
  document.getElementById('statDone').textContent  = '0';
  document.getElementById('statErr').textContent   = '0';
  document.getElementById('statPct').textContent   = '0%';
  document.getElementById('progFill').style.width  = '0%';

  curCmd = 0; curChar = 0; totalErrors = 0; startTime = null;
  activateCurrentChar();
  document.addEventListener('keydown', handleKey);
}

function escH(c) {
  return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Typing mechanics ─────────────────────────────────────────────
function activateCurrentChar() {
  if (curCmd >= cmdLines.length) { showDone(); return; }
  const cmd = lines[cmdLines[curCmd]].text;
  // Mark current char
  if (curChar < cmd.length) {
    const el = document.getElementById(`c-${curCmd}-${curChar}`);
    if (el) { el.className = 'char cur'; el.scrollIntoView({block:'nearest'}); }
  }
}

function handleKey(e) {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (curCmd >= cmdLines.length) return;

  if (!startTime) startTime = Date.now();

  const cmd = lines[cmdLines[curCmd]].text;

  if (e.key === 'Enter') {
    // Must finish current command first
    if (curChar < cmd.length) { flashError(); return; }
    e.preventDefault();
    finishCommand();
    return;
  }

  if (e.key.length !== 1) return; // ignore Shift, Arrow, etc.
  e.preventDefault();

  const expected = cmd[curChar];
  const el = document.getElementById(`c-${curCmd}-${curChar}`);

  if (e.key === expected) {
    if (el) el.className = 'char done';
    curChar++;
    if (curChar >= cmd.length) {
      // Finished all chars — wait for Enter
      activateEnterHint();
    } else {
      activateCurrentChar();
    }
  } else {
    totalErrors++;
    document.getElementById('statErr').textContent = totalErrors;
    if (el) {
      el.className = 'char wrong';
      el.addEventListener('animationend', () => { el.className = 'char cur'; }, {once:true});
    }
  }
}

function activateEnterHint() {
  // All chars done — show ↵ hint
  const cmdIdx = curCmd;
  const lineEl = document.getElementById('cmd-' + cmdIdx);
  if (lineEl) {
    const hint = document.createElement('span');
    hint.style.cssText = 'color:#4dabf7;opacity:.6;font-size:12px;margin-left:4px;';
    hint.textContent = '↵';
    lineEl.appendChild(hint);
  }
}

function finishCommand() {
  // Mark whole command done
  const cmd = lines[cmdLines[curCmd]].text;
  for (let i = 0; i < cmd.length; i++) {
    const el = document.getElementById(`c-${curCmd}-${i}`);
    if (el) el.className = 'char done';
  }
  // Remove future class from this row
  const row = document.getElementById('line-' + cmdLines[curCmd]);
  if (row) row.classList.remove('future');

  curCmd++; curChar = 0;

  // Update stats
  const done = curCmd;
  const total = cmdLines.length;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statPct').textContent  = Math.round(done/total*100) + '%';
  document.getElementById('progFill').style.width = (done/total*100) + '%';

  if (curCmd >= total) { showDone(); return; }

  // Un-dim next command row
  const nextRow = document.getElementById('line-' + cmdLines[curCmd]);
  if (nextRow) nextRow.classList.remove('future');

  activateCurrentChar();
}

function flashError() {
  // Shake the current char
  const el = document.getElementById(`c-${curCmd}-${curChar}`);
  if (!el) return;
  el.className = 'char wrong';
  el.addEventListener('animationend', () => { el.className = 'char cur'; }, {once:true});
}

// ─── Done ────────────────────────────────────────────────────────
function showDone() {
  document.removeEventListener('keydown', handleKey);
  document.getElementById('progFill').style.width = '100%';
  const elapsed = startTime ? Math.round((Date.now() - startTime) / 1000) : 0;
  const doneMsg = document.getElementById('doneMsg');
  document.getElementById('doneStats').textContent =
    `用时 ${elapsed}s · 错误 ${totalErrors} 次 · 命令 ${cmdLines.length} 条`;
  doneMsg.style.display = 'block';
  document.getElementById('drillBlock').style.display = 'none';
}

function restart() {
  document.getElementById('doneMsg').style.display = 'none';
  document.getElementById('drillBlock').style.display = '';
  buildDrill();
}

// ─── Error display ────────────────────────────────────────────────
function showError(msg) {
  const b = document.getElementById('errBanner');
  b.textContent = '⚠️ ' + msg;
  b.className = 'err-banner show';
  document.getElementById('qTitle').textContent = '加载失败';
}

// ─── Entry point ─────────────────────────────────────────────────
const qid = new URLSearchParams(location.search).get('qid');
if (!qid) {
  showError('缺少 ?qid= 参数。示例：drill.html?qid=操作系统-001');
  document.getElementById('qTitle').textContent = '示例：drill.html?qid=操作系统-001';
} else {
  loadQuestion(qid);
}
</script>
</body>
</html>
