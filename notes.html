<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>速记本 · 主网自动化竞赛</title>
<style>
:root{
  --bg:#1a1a1a;--text:#e0e0e0;--muted:#888;
  --card:#232323;--card-2:#1f1f1f;--border:#2a2a2a;--border-strong:#444;
  --accent:#ffd54f;--green:#4caf50;--green-hov:#45a049;
  --red:#c62828;--red-hov:#b71c1c;--warn:#f57c00;--warn-hov:#ef6c00;
  --gray:#555;--gray-hov:#666;--purp:#7b1fa2;--purp-hov:#6a1b9a;
  --blue:#1976d2;--blue-hov:#1565c0;
  --input-bg:#2a2a2a;--code-bg:#333;
  --shadow:0 2px 6px rgba(0,0,0,0.4);
}
body.light{
  --bg:#f5f5f5;--text:#2a2a2a;--muted:#666;
  --card:#ffffff;--card-2:#fafafa;--border:#e0e0e0;--border-strong:#bbb;
  --accent:#e65100;--green:#2e7d32;--green-hov:#1b5e20;
  --red:#c62828;--red-hov:#a31515;--warn:#ef6c00;--warn-hov:#e65100;
  --gray:#9e9e9e;--gray-hov:#757575;--purp:#6a1b9a;--purp-hov:#4a148c;
  --blue:#1565c0;--blue-hov:#0d47a1;
  --input-bg:#ffffff;--code-bg:#eee;
  --shadow:0 2px 6px rgba(0,0,0,0.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SF Mono',Consolas,Menlo,monospace;padding:20px 14px 60px;min-height:100vh;transition:background 0.2s,color 0.2s}
.container{max-width:920px;margin:0 auto}
h1{font-size:22px;margin-bottom:6px}
h2{font-size:15px;color:var(--accent);margin:14px 0 8px}
h3{font-size:13px;color:var(--muted);margin:12px 0 6px}
p{margin-bottom:6px;color:var(--muted);font-size:13px;line-height:1.6}
code{background:var(--code-bg);padding:2px 6px;border-radius:3px;color:var(--accent);font-size:12px}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}

button{padding:9px 16px;background:var(--green);color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer;margin:3px 5px 3px 0;font-family:inherit;transition:all 0.15s;font-weight:500}
button:hover:not(:disabled){background:var(--green-hov);transform:translateY(-1px);box-shadow:var(--shadow)}
button:active:not(:disabled){transform:translateY(0)}
button:disabled{background:var(--border-strong);cursor:not-allowed;opacity:0.55}
button.s{background:var(--gray)}button.s:hover:not(:disabled){background:var(--gray-hov)}
button.warn{background:var(--warn)}button.warn:hover:not(:disabled){background:var(--warn-hov)}
button.red{background:var(--red)}button.red:hover:not(:disabled){background:var(--red-hov)}
button.purp{background:var(--purp)}button.purp:hover:not(:disabled){background:var(--purp-hov)}
button.blue{background:var(--blue)}button.blue:hover:not(:disabled){background:var(--blue-hov)}

input,select,textarea{width:100%;padding:9px 12px;background:var(--input-bg);color:var(--text);border:1px solid var(--border-strong);border-radius:6px;font-family:inherit;font-size:13px;transition:border 0.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
textarea{min-height:90px;resize:vertical;line-height:1.6}
select{cursor:pointer}

.theme-toggle{position:fixed;top:12px;right:12px;width:34px;height:34px;border-radius:50%;padding:0;font-size:16px;background:var(--card);color:var(--text);border:1px solid var(--border-strong);cursor:pointer;z-index:50;transition:all 0.15s}
.theme-toggle:hover{transform:scale(1.08);box-shadow:var(--shadow)}

/* 顶部条 */
.top-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.top-bar h1{flex:1;min-width:200px}
.top-bar .btns{display:flex;flex-wrap:wrap;gap:6px}

.hint{background:var(--card-2);border-left:3px solid var(--blue);padding:10px 14px;border-radius:6px;font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px}

/* 新增/编辑表单 */
.editor{background:var(--card);border-radius:8px;padding:14px 16px;margin:12px 0;border-left:3px solid var(--green);box-shadow:var(--shadow);display:none}
.editor.show{display:block}
.editor .row{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap}
.editor .row label{min-width:60px;color:var(--muted);font-size:12px}
.editor .row .gap{flex:1;min-width:140px}
.editor-title{font-size:14px;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.editor-title .id{font-size:11px;color:var(--muted);font-weight:normal}

/* 图片上传/列表 */
.img-area{margin-top:10px}
.img-input-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.img-input-row label.imgbtn{display:inline-block;padding:8px 14px;background:var(--blue);color:#fff;border-radius:7px;cursor:pointer;font-size:12px;transition:all 0.15s}
.img-input-row label.imgbtn:hover{background:var(--blue-hov);transform:translateY(-1px);box-shadow:var(--shadow)}
.img-input-row input[type=file]{display:none}
.img-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.img-thumb{position:relative;width:92px;height:92px;border-radius:6px;overflow:hidden;border:1px solid var(--border-strong);cursor:pointer}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.img-thumb .rm{position:absolute;top:2px;right:2px;width:22px;height:22px;padding:0;background:rgba(198,40,40,0.92);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:14px;line-height:22px;text-align:center;margin:0}
.img-thumb .rm:hover{background:rgba(183,28,28,1);transform:none}

/* 列表 */
.list-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:14px 0 10px}
.list-toolbar select,.list-toolbar input{flex:0 0 auto;width:auto;min-width:140px}
.list-toolbar input.search{flex:1;min-width:180px}
.list-toolbar .stat{color:var(--muted);font-size:12px;margin-left:auto}

.note-card{background:var(--card);border-radius:8px;padding:12px 14px;margin:10px 0;border-left:3px solid var(--purp);box-shadow:var(--shadow);cursor:pointer;transition:transform 0.15s}
.note-card:hover{transform:translateY(-1px)}
.note-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.note-head .title{font-weight:bold;color:var(--text);font-size:14px;flex:1;min-width:160px}
.note-head .tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--card-2);color:var(--accent);border:1px solid var(--border)}
.note-head .ts{font-size:11px;color:var(--muted)}
.note-desc{color:var(--muted);font-size:12px;line-height:1.6;white-space:pre-wrap;max-height:60px;overflow:hidden;position:relative}
.note-desc.has-more::after{content:'…';position:absolute;bottom:0;right:0;background:linear-gradient(90deg,transparent,var(--card) 40%);padding-left:14px}
.note-imgs{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.note-imgs .mini{width:46px;height:46px;border-radius:4px;border:1px solid var(--border);overflow:hidden}
.note-imgs .mini img{width:100%;height:100%;object-fit:cover}
.note-actions{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.note-actions button{margin:0;padding:5px 10px;font-size:11px}

.empty{padding:30px 12px;color:var(--gray-hov);font-size:13px;text-align:center;font-style:italic;background:var(--card-2);border-radius:8px;margin:14px 0}

/* 图片放大查看 */
#imgViewer{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;cursor:zoom-out}
#imgViewer.show{display:flex}
#imgViewer img{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}

/* 移动端微调 */
@media (max-width:600px){
  body{padding:14px 10px 60px}
  h1{font-size:19px}
  .editor .row label{min-width:0}
  .img-thumb{width:80px;height:80px}
  button{padding:8px 12px;font-size:12px}
  .top-bar .btns button{padding:7px 11px;font-size:12px}
}
</style>
</head>
<body><button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
<div class="container">

<div class="top-bar">
  <h1>📷 速记本</h1>
  <div class="btns">
    <button onclick="openNew()">+ 新增速记</button>
    <button class="blue" onclick="exportAll()" title="导出全部 JSON · 交给 Claude 整理">📤 导出 JSON</button>
    <button class="s" onclick="location.href='index.html'">← 训练中心</button>
  </div>
</div>

<div class="hint">
  零碎知识点录入区 · 不绑题。拍照（手机点 📷 按钮直接调相机）+ 一段描述就行，先扔进来，<b>整理时再导出 JSON 给 Claude 归档到 KP / 资料库</b>。<br>
  数据存在本机浏览器 <code>localStorage.freeNotes_v1</code>，<b>清浏览器数据会丢</b>，所以建议每周末导出一次 JSON。
</div>

<!-- ============ 新增/编辑表单 ============ -->
<div class="editor" id="editor">
  <div class="editor-title">
    <span id="editorTitle">新增速记</span>
    <span class="id" id="editorId"></span>
  </div>
  <div class="row">
    <label>学科</label>
    <select id="fSubject" class="gap"></select>
  </div>
  <div class="row">
    <label>标题</label>
    <input type="text" id="fTitle" class="gap" placeholder="一句话概括，比如：crontab 重启服务的坑">
  </div>
  <div class="row" style="align-items:flex-start">
    <label style="margin-top:9px">描述</label>
    <textarea id="fDesc" class="gap" placeholder="听到的要点、自己的理解、命令、可能的归类提示……写多少都行，整理时 Claude 会读这里。"></textarea>
  </div>

  <div class="img-area">
    <h3>📷 图片（多张 OK · 手机可直接拍照）</h3>
    <div class="img-input-row">
      <!-- 拍照（手机）-->
      <label class="imgbtn" for="fImgCam">📷 拍照</label>
      <input type="file" id="fImgCam" accept="image/*" capture="environment" multiple onchange="addImages(event)">
      <!-- 相册/文件 -->
      <label class="imgbtn" for="fImgPick" style="background:var(--purp)">🖼 选图</label>
      <input type="file" id="fImgPick" accept="image/*" multiple onchange="addImages(event)">
    </div>
    <div class="img-list" id="fImgList"></div>
  </div>

  <div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end">
    <button class="s" onclick="cancelEdit()">取消</button>
    <button onclick="saveEdit()">💾 保存</button>
  </div>
</div>

<!-- ============ 列表工具栏 ============ -->
<div class="list-toolbar">
  <select id="filterSubj" onchange="renderList()">
    <option value="">全部学科</option>
  </select>
  <input type="text" class="search" id="searchBox" placeholder="🔎 标题/描述关键词…" oninput="renderList()">
  <span class="stat" id="stat"></span>
</div>

<!-- ============ 列表 ============ -->
<div id="listBox"></div>

</div>

<!-- 图片放大 -->
<div id="imgViewer" onclick="closeViewer()"><img id="viewerImg" src="" alt=""></div>

<script>
const $=id=>document.getElementById(id);
const STORE_KEY='freeNotes_v1';
const SUBJECTS_FALLBACK=['操作系统','基础平台','数据库','系统平台','稳态监控','综合智能告警','网络分析','调度数据网'];

// 状态
let NOTES=[];                // 全部速记
let DRAFT=null;              // 当前编辑中的对象 (新增或编辑)
let DRAFT_IS_NEW=false;
let SUBJECTS=SUBJECTS_FALLBACK.slice();

// ---- 启动 ----
async function init(){
  // 尝试拉 exam_data.json 的学科列表（保持和试卷一致）
  try{
    const r=await fetch('exam_data.json?_t='+Date.now());
    const d=await r.json();
    const ks=Object.keys(d);
    if(ks.length)SUBJECTS=ks;
  }catch(e){/* 离线/未部署也能用 fallback */}

  // 学科下拉填充（含"未分类"）
  fillSubjectSelect($('fSubject'),true);
  fillSubjectSelect($('filterSubj'),false,true);

  // 读 localStorage
  loadNotes();
  renderList();
}

function fillSubjectSelect(el,withUncat,asFilter){
  el.innerHTML='';
  if(asFilter){
    const o=document.createElement('option');o.value='';o.textContent='全部学科';el.appendChild(o);
  }
  if(withUncat){
    const o=document.createElement('option');o.value='未分类';o.textContent='未分类';el.appendChild(o);
  }
  for(const s of SUBJECTS){
    const o=document.createElement('option');o.value=s;o.textContent=s;el.appendChild(o);
  }
  if(asFilter){
    const o=document.createElement('option');o.value='未分类';o.textContent='未分类';el.appendChild(o);
  }
}

// ---- 存储 ----
function loadNotes(){
  try{NOTES=JSON.parse(localStorage.getItem(STORE_KEY))||[];}catch(e){NOTES=[];}
  // 兼容：保证字段齐
  for(const n of NOTES){
    n.images=n.images||[];
    n.subject=n.subject||'未分类';
    n.title=n.title||'(无标题)';
    n.desc=n.desc||'';
  }
}
function persist(){
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify(NOTES));
  }catch(e){
    alert('保存失败（localStorage 可能满了）：'+e.message+'\n建议先导出 JSON 备份，再清掉一些旧速记。');
  }
}

// ---- 新增 / 编辑 ----
function openNew(){
  DRAFT={
    id:'fn-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6),
    ts:Date.now(),
    updated_at:Date.now(),
    subject:localStorage.getItem('lastFreeSubj')||'未分类',
    title:'',
    desc:'',
    images:[],
  };
  DRAFT_IS_NEW=true;
  showEditor();
}
function openEdit(id){
  const n=NOTES.find(x=>x.id===id);
  if(!n)return;
  // 深拷贝以便取消
  DRAFT=JSON.parse(JSON.stringify(n));
  DRAFT_IS_NEW=false;
  showEditor();
}
function showEditor(){
  $('editorTitle').textContent=DRAFT_IS_NEW?'新增速记':'编辑速记';
  $('editorId').textContent=DRAFT.id;
  $('fSubject').value=DRAFT.subject;
  $('fTitle').value=DRAFT.title;
  $('fDesc').value=DRAFT.desc;
  renderDraftImgs();
  $('editor').classList.add('show');
  $('editor').scrollIntoView({behavior:'smooth',block:'start'});
  setTimeout(()=>$('fTitle').focus(),60);
}
function cancelEdit(){
  if(!DRAFT)return;
  // 简单确认
  const dirty=
    $('fTitle').value.trim()!==(DRAFT.title||'').trim()||
    $('fDesc').value.trim()!==(DRAFT.desc||'').trim()||
    $('fSubject').value!==DRAFT.subject;
  if(dirty&&!confirm('未保存的修改会丢，确认取消？'))return;
  DRAFT=null;
  $('editor').classList.remove('show');
}
function saveEdit(){
  if(!DRAFT)return;
  DRAFT.subject=$('fSubject').value||'未分类';
  DRAFT.title=$('fTitle').value.trim()||'(无标题)';
  DRAFT.desc=$('fDesc').value;
  DRAFT.updated_at=Date.now();
  localStorage.setItem('lastFreeSubj',DRAFT.subject);

  if(DRAFT_IS_NEW){
    NOTES.unshift(DRAFT);
  }else{
    const i=NOTES.findIndex(x=>x.id===DRAFT.id);
    if(i>=0)NOTES[i]=DRAFT;else NOTES.unshift(DRAFT);
  }
  persist();
  DRAFT=null;
  $('editor').classList.remove('show');
  renderList();
}

// ---- 图片 ----
function addImages(ev){
  if(!DRAFT){return;}
  const files=Array.from(ev.target.files||[]);
  if(!files.length)return;
  let done=0;
  for(const f of files){
    const reader=new FileReader();
    reader.onload=ee=>{
      DRAFT.images.push({
        name:f.name||('img-'+Date.now()),
        type:f.type,size:f.size,
        data:ee.target.result,
        added_at:Date.now(),
      });
      done++;
      if(done===files.length){
        renderDraftImgs();
        ev.target.value='';
      }
    };
    reader.onerror=()=>{
      done++;
      if(done===files.length){renderDraftImgs();ev.target.value='';}
    };
    reader.readAsDataURL(f);
  }
}
function renderDraftImgs(){
  const box=$('fImgList');
  if(!DRAFT||!DRAFT.images.length){box.innerHTML='';return;}
  box.innerHTML=DRAFT.images.map((img,idx)=>
    '<div class="img-thumb" onclick="viewImg('+JSON.stringify(img.data).replace(/"/g,'&quot;')+')">'
    +'<img src="'+img.data+'" alt="'+escapeHtml(img.name||'')+'">'
    +'<button class="rm" onclick="event.stopPropagation();removeDraftImg('+idx+')" title="删除">×</button></div>'
  ).join('');
}
function removeDraftImg(idx){
  if(!DRAFT)return;
  DRAFT.images.splice(idx,1);
  renderDraftImgs();
}

// ---- 列表 ----
function renderList(){
  const subj=$('filterSubj').value;
  const q=($('searchBox').value||'').trim().toLowerCase();

  let list=NOTES.slice();
  if(subj)list=list.filter(n=>n.subject===subj);
  if(q){
    list=list.filter(n=>
      (n.title||'').toLowerCase().includes(q)||
      (n.desc||'').toLowerCase().includes(q)
    );
  }
  // 按 updated_at / ts 倒序
  list.sort((a,b)=>(b.updated_at||b.ts||0)-(a.updated_at||a.ts||0));

  const box=$('listBox');
  $('stat').textContent='共 '+NOTES.length+' 条 · 当前 '+list.length+' 条';

  if(!list.length){
    box.innerHTML='<div class="empty">'+(NOTES.length?'当前过滤下没结果。':'还没有速记。点右上「+ 新增速记」开始记。')+'</div>';
    return;
  }
  box.innerHTML=list.map(n=>{
    const descShort=(n.desc||'').slice(0,200);
    const hasMore=(n.desc||'').length>200;
    const imgs=(n.images||[]).slice(0,6).map(im=>
      '<div class="mini" onclick="event.stopPropagation();viewImg('+JSON.stringify(im.data).replace(/"/g,'&quot;')+')"><img src="'+im.data+'" alt=""></div>'
    ).join('');
    const more=(n.images||[]).length>6?'<div class="mini" style="display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa">+'+((n.images||[]).length-6)+'</div>':'';
    return '<div class="note-card" onclick="openEdit('+JSON.stringify(n.id).replace(/"/g,'&quot;')+')">'
      +'<div class="note-head">'
        +'<span class="title">'+escapeHtml(n.title)+'</span>'
        +'<span class="tag">'+escapeHtml(n.subject)+'</span>'
        +'<span class="ts">'+fmtTime(n.updated_at||n.ts)+'</span>'
      +'</div>'
      +(descShort?'<div class="note-desc'+(hasMore?' has-more':'')+'">'+escapeHtml(descShort)+'</div>':'')
      +((n.images||[]).length?'<div class="note-imgs">'+imgs+more+'</div>':'')
      +'<div class="note-actions">'
        +'<button class="s" onclick="event.stopPropagation();openEdit('+JSON.stringify(n.id).replace(/"/g,'&quot;')+')">编辑</button>'
        +'<button class="red" onclick="event.stopPropagation();delNote('+JSON.stringify(n.id).replace(/"/g,'&quot;')+')">删除</button>'
      +'</div>'
    +'</div>';
  }).join('');
}

function delNote(id){
  const n=NOTES.find(x=>x.id===id);
  if(!n)return;
  if(!confirm('确定删除「'+(n.title||'无标题')+'」？不可恢复。'))return;
  NOTES=NOTES.filter(x=>x.id!==id);
  persist();
  renderList();
}

// ---- 导出 ----
function exportAll(){
  if(!NOTES.length){alert('还没有任何速记，导出个寂寞？');return;}
  const payload={
    type:'freeNotes_export',
    version:1,
    exported_at:new Date().toISOString(),
    count:NOTES.length,
    notes:NOTES,
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const stamp=new Date().toISOString().replace(/[:.]/g,'-').slice(0,16);
  a.download='freeNotes_'+stamp+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},200);
}

// ---- 图片查看器 ----
function viewImg(src){
  $('viewerImg').src=src;
  $('imgViewer').classList.add('show');
}
function closeViewer(){
  $('imgViewer').classList.remove('show');
  $('viewerImg').src='';
}

// ---- 工具 ----
function escapeHtml(c){return String(c).replace(/[<>&"']/g,ch=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[ch]));}
function fmtTime(ts){
  if(!ts)return '';
  const d=new Date(ts);
  const pad=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

// ---- 主题 ----
function applyTheme(t){
  if(t==='light'){document.body.classList.add('light');$('themeBtn').textContent='☀️';}
  else{document.body.classList.remove('light');$('themeBtn').textContent='🌙';}
}
function toggleTheme(){
  const next=document.body.classList.contains('light')?'dark':'light';
  applyTheme(next);
  localStorage.setItem('theme',next);
}
applyTheme(localStorage.getItem('theme')||'dark');

init();
</script>
</body>
</html>
