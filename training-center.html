<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D6.0 备考训练中心</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* ── Light (默认 / PDF 风格) ── */
  :root {
    --bg: #ffffff;
    --surface: #fafafa;
    --border: #e5e5ea;
    --border-light: #d4d4d8;
    --text: #18181b;
    --text-dim: #71717a;
    --text-muted: #a1a1aa;
    --accent-linux: #16a34a;
    --accent-dm: #2563eb;
    --accent-d6: #d97706;
    --weak: #dc2626;
    --done: #16a34a;
    --partial: #eab308;
    --untouched: #d4d4d8;
    --tag-weak-bg: rgba(220,38,38,0.10);
    --tag-weak-border: rgba(220,38,38,0.35);
    --shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  /* ── Dark (切换) ── */
  html[data-theme="dark"] {
    --bg: #0f0f11;
    --surface: #16161a;
    --border: #242429;
    --border-light: #2e2e35;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --text-muted: #3a3a45;
    --accent-linux: #4ade80;
    --accent-dm: #60a5fa;
    --accent-d6: #f59e0b;
    --weak: #f87171;
    --done: #4ade80;
    --partial: #facc15;
    --untouched: #3a3a45;
    --tag-weak-bg: rgba(248,113,113,0.12);
    --tag-weak-border: rgba(248,113,113,0.3);
    --shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    padding: 32px 24px 64px;
    transition: background 0.2s, color 0.2s;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .header-left h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header-left p {
    margin-top: 4px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .total-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
  }
  .total-badge span {
    display: block;
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 2px;
  }
  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover {
    border-color: var(--border-light);
    color: var(--text);
  }

  /* ── Overview cards ── */
  .overview {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .overview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .overview-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .overview-card.linux::before { background: var(--accent-linux); }
  .overview-card.dm::before    { background: var(--accent-dm); }
  .overview-card.d6::before    { background: var(--accent-d6); }
  .ov-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }
  .ov-nums {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 6px;
  }
  .ov-nums .big { font-size: 28px; font-weight: 700; line-height: 1; }
  .ov-nums .total { font-size: 13px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .ov-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
  }
  .ov-meta span { white-space: nowrap; }
  .ov-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .ov-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }
  .linux .ov-bar-fill { background: var(--accent-linux); }
  .dm    .ov-bar-fill { background: var(--accent-dm); }
  .d6    .ov-bar-fill { background: var(--accent-d6); }
  .linux .big { color: var(--accent-linux); }
  .dm    .big { color: var(--accent-dm); }
  .d6    .big { color: var(--accent-d6); }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border-light); color: var(--text); }
  .filter-btn.active {
    background: var(--border);
    color: var(--text);
    border-color: var(--border-light);
  }
  .filter-btn.weak-btn.active {
    background: var(--tag-weak-bg);
    color: var(--weak);
    border-color: var(--tag-weak-border);
  }
  .filter-label, .tip {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }
  .tip { margin-left: auto; }

  /* ── Legend (内联在 filter-bar 里) ── */
  .legend-inline {
    display: inline-flex;
    gap: 12px;
    padding: 4px 10px;
    margin-left: 12px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }
  .legend-dot {
    width: 6px; height: 6px; border-radius: 50%; display: inline-block;
  }
  .legend-dot.done    { background: var(--done); }
  .legend-dot.partial { background: var(--partial); }
  .legend-dot.un      { background: var(--untouched); box-shadow: 0 0 0 1.5px var(--border-light) inset; }
  .legend-dot.weak    { background: var(--weak); }

  /* ── Columns ── */
  .columns {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    align-items: start;
  }
  .col-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 0 12px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .col-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .linux .col-dot { background: var(--accent-linux); }
  .dm    .col-dot { background: var(--accent-dm); }
  .d6    .col-dot { background: var(--accent-d6); }
  .col-title {
    font-size: 13px;
    font-weight: 700;
    flex: 1;
  }
  .col-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ── Section ── */
  .section { margin-bottom: 16px; }
  .section-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    padding: 0 0 6px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .sec-q-sum {
    font-size: 10px;
    color: var(--accent-dm);
    font-weight: 500;
    flex-shrink: 0;
  }
  html[data-theme="dark"] .sec-q-sum {
    color: var(--accent-dm);
  }

  /* ── Item row（grid 布局保证 q 数列上下对齐）── */
  .item {
    display: grid;
    grid-template-columns: 8px 38px 1fr 28px 14px 18px;
    gap: 6px;
    align-items: center;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    position: relative;
  }
  .item:hover { background: var(--border); }
  .item-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .item[data-status="done"]      .item-dot { background: var(--done); }
  .item[data-status="partial"]   .item-dot { background: var(--partial); }
  .item[data-status="untouched"] .item-dot { background: var(--untouched); box-shadow: 0 0 0 1.5px var(--border-light) inset; }
  .item-text {
    flex: 1;
    font-size: 12px;
    line-height: 1.4;
    color: var(--text);
    transition: color 0.2s;
  }
  .item[data-status="done"] .item-text { color: var(--text-dim); }
  .item[data-status="untouched"] .item-text { color: var(--text-dim); }
  .item-weak {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--weak);
    background: var(--tag-weak-bg);
    border: 1px solid var(--tag-weak-border);
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .item[data-weak="true"] .item-weak { opacity: 1; }
  .item-src {
    font-size: 8px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    flex-shrink: 0;
    opacity: 0.6;
  }
  .item:hover .item-src { opacity: 1; }

  /* 编号（1.1.10 这种） */
  .item-code {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    color: var(--text-muted);
    min-width: 36px;
    flex-shrink: 0;
  }

  /* 题数徽章 */
  .q-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--accent-dm);
    background: rgba(37, 99, 235, 0.08);
    border: 1px solid rgba(37, 99, 235, 0.2);
    border-radius: 3px;
    padding: 0 5px;
    min-width: 22px;
    text-align: center;
    flex-shrink: 0;
  }
  .q-badge.q-zero {
    color: var(--text-muted);
    background: transparent;
    border-color: var(--border);
  }
  html[data-theme="dark"] .q-badge {
    background: rgba(96, 165, 250, 0.1);
    border-color: rgba(96, 165, 250, 0.25);
  }

  /* D6 组的章节分隔（不同 category 之间） */
  .chapter-divider {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    font-weight: 700;
    margin: 14px 0 6px;
    padding: 4px 8px;
    background: var(--surface);
    border-left: 2px solid var(--accent-d6);
    border-radius: 0 4px 4px 0;
  }

  /* ── Footer bar ── */
  .footer-bar {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }
  .footer-bar a {
    color: var(--text-dim);
    text-decoration: none;
    margin-left: 12px;
  }
  .footer-bar a:hover { color: var(--text); }

  @media (max-width: 900px) {
    .columns, .overview { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>D6.0 备考训练中心</h1>
    <p>单击切状态 · 双击标记薄弱 · 顶部按状态筛选</p>
  </div>
  <div class="header-right">
    <div class="total-badge">
      <span id="total-pct">—</span>
      总完成率
    </div>
    <button class="icon-btn" id="theme-toggle" title="切换深色/浅色">◐</button>
  </div>
</div>

<!-- Overview cards：每个 category 一张（render 时动态生成） -->
<div class="overview" id="overview"></div>

<!-- Filter + Legend 合并一行 -->
<div class="filter-bar">
  <span class="filter-label">筛选：</span>
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="untouched">未训练</button>
  <button class="filter-btn" data-filter="partial">进行中</button>
  <button class="filter-btn" data-filter="done">已掌握</button>
  <button class="filter-btn weak-btn" data-filter="weak">⚠ 薄弱点</button>
  <span class="legend-inline">
    <span class="legend-item"><span class="legend-dot done"></span>已掌握</span>
    <span class="legend-item"><span class="legend-dot partial"></span>训练中</span>
    <span class="legend-item"><span class="legend-dot un"></span>未训练</span>
    <span class="legend-item"><span class="legend-dot weak"></span>薄弱点</span>
  </span>
  <span class="tip">单击切状态 · 双击标记薄弱</span>
</div>

<!-- Main columns -->
<div class="columns" id="main-cols"></div>

<!-- outline + 题库索引：file:// 下用 <script src> 加载（fetch 会被 CORS 拦） -->
<script src="./outline.js" onerror="console.warn('outline.js 未生成')"></script>
<script src="./questions_index.js" onerror="console.warn('questions_index.js 未生成')"></script>

<div class="footer-bar">
  <span id="src-info">数据源：localStorage（本地）+ progress_data.json 派生</span>
  <span>
    <a href="./">首页</a>
    <a href="./exam.html">网页训练</a>
    <a href="./drill.html">盲敲惩罚</a>
    <a href="#" id="reset-link">重置本地</a>
  </span>
</div>

<script>
// ============ 数据 SSOT ============
// 顶部统计卡：按 3 大组聚合（OVERVIEW_GROUPS）
// 底部 KP 列：每个 category 一列（DATA，约 8 列；自适应 wrap）
// Tag 命名：单层 `KP::<末级KP名>`（用户偏好不嵌套）
let OUTLINE = null;        // 原始 outline 对象
let DATA = [];             // 8 个 category 一一对应：[{id,label,cls,sections,subjects}]
let QIDX = null;           // window.QUESTIONS_INDEX (按 KP code 聚合)
let CAT_STATS = {};        // 顶部 3 大组的统计

const OVERVIEW_GROUPS = [
  { id: 'linux', label: '一、Linux 系统基础',         cls: 'linux', cats: ['linux'] },
  { id: 'dm',    label: '二、达梦数据库 (DM)',         cls: 'dm',    cats: ['dm'] },
  { id: 'd6',    label: '三~八、D6.0 平台 + SCADA + 网分 + AGC',  cls: 'd6',
                 cats: ['d6plat','scada','alarm','netan','agcavc','dnet'] }
];
// category id → 顶部统计卡的 group id（用于把 cat 状态算进哪一卡）
const CAT_TO_GROUP = {
  linux:'linux', dm:'dm',
  d6plat:'d6', scada:'d6', alarm:'d6', netan:'d6', agcavc:'d6', dnet:'d6'
};

function kpTag(kp) {
  const prefix = (OUTLINE && OUTLINE.tag_prefix) || 'KP::';
  return `${prefix}${kp.name}`;
}

async function loadOutline() {
  let o;
  if (window.OUTLINE_DATA) {
    o = window.OUTLINE_DATA;
  } else {
    const r = await fetch('./outline.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('outline.json ' + r.status);
    o = await r.json();
  }
  OUTLINE = o;
  QIDX = window.QUESTIONS_INDEX || { total: 0, by_kp: {}, by_subj: {} };

  // 每个 category 单独一列
  DATA = o.categories.map(c => {
    const groupId = CAT_TO_GROUP[c.id] || 'd6';
    const sections = c.sections.map(sec => {
      const kps = sec.kps.map(kp => ({
        code: kp.code,
        name: kp.name,
        desc: kp.desc,
        tag: kpTag(kp),
        q_count: (QIDX.by_kp[kp.code] || []).length,
      }));
      const secQTotal = kps.reduce((s,k) => s + k.q_count, 0);
      return {
        code: sec.code,
        label: sec.name,
        q_total: secQTotal,
        kps
      };
    });
    return {
      id: c.id,
      label: c.ordinal + '、' + c.name,
      cls: groupId,                       // 颜色按所属大组（linux/dm/d6）
      groupId,
      subjects: c.subjects || [],
      sections,
      q_total: sections.reduce((s, sec) => s + sec.q_total, 0),
      kp_total: sections.reduce((s, sec) => s + sec.kps.length, 0)
    };
  });
  return o;
}

const STATUSES = ['untouched', 'partial', 'done'];
const STORAGE_KEY = 'd6_training_v1';
const THEME_KEY = 'd6_training_theme';
let CURRENT_FILTER = 'all';
let AUTO_DERIVED = {};   // 从 progress_data.json 派生的默认状态（key → status）

// ============ State 持久化 ============
function getState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveState(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}
// KP key = 编号本身（如 "1.1.10"），更直观且跨 schema 升级稳定
function makeKey(kp) {
  return kp.code;
}

// 单 KP 当前状态：手动覆盖 > 自动派生 > untouched
function getStatus(key) {
  const s = getState();
  if (s[key]?.status_manual) return s[key].status_manual;
  return AUTO_DERIVED[key] || 'untouched';
}
function getWeak(key) {
  const s = getState();
  return !!s[key]?.weak;
}

function cycleStatus(key) {
  const cur = getStatus(key);
  const next = STATUSES[(STATUSES.indexOf(cur) + 1) % STATUSES.length];
  const s = getState();
  s[key] = { ...(s[key] || {}), status_manual: next };
  saveState(s);
  return next;
}
function toggleWeak(key) {
  const s = getState();
  s[key] = { ...(s[key] || {}), weak: !(s[key]?.weak) };
  saveState(s);
  return s[key].weak;
}

// ============ 自动派生（progress_data.json）============
// 大组（linux/dm/d6）→ 多个后台学科聚合 → 题级统计
// KP 默认 status：按该组 passed_rate 给所有 KP 同一默认（粗）；以后 AnkiConnect 接上后改 KP 粒度

async function loadAutoDerive() {
  try {
    const r = await fetch('./progress_data.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('progress_data.json ' + r.status);
    const pj = await r.json();
    const subjStat = pj.subjects || {};

    // 1. 顶部 3 大组统计（聚合各 category 的 subjects）
    CAT_STATS = {};
    OVERVIEW_GROUPS.forEach(g => {
      const agg = { total: 0, attempted: 0, passed: 0, wrong: 0 };
      // 找该大组覆盖的所有 categories，再合并它们的 subjects
      const cats = DATA.filter(c => g.cats.includes(c.id));
      const subjs = [...new Set(cats.flatMap(c => c.subjects))];
      subjs.forEach(name => {
        const s = subjStat[name];
        if (!s) return;
        agg.total     += s.total || 0;
        agg.attempted += s.attempted || 0;
        agg.passed    += s.passed || 0;
        agg.wrong     += s.wrong_pending || 0;
      });
      CAT_STATS[g.id] = agg;
    });

    // 2. KP 默认 status：按 KP 所属大组的 passed_rate；KP 有题数=0 直接 untouched
    AUTO_DERIVED = {};
    DATA.forEach(cat => {
      const agg = CAT_STATS[cat.groupId];
      let grpDefault = 'untouched';
      if (agg && agg.total > 0) {
        const rate = agg.passed / agg.total;
        if (rate >= 0.8) grpDefault = 'done';
        else if (agg.attempted > 0 || agg.passed > 0) grpDefault = 'partial';
      }
      cat.sections.forEach(sec => {
        sec.kps.forEach(kp => {
          AUTO_DERIVED[makeKey(kp)] = kp.q_count > 0 ? grpDefault : 'untouched';
        });
      });
    });

    document.getElementById('src-info').textContent =
      `数据源：localStorage + progress_data.json (${pj.generated || '?'}) + questions_index (${QIDX.total} 题)`;
  } catch (e) {
    console.warn('progress_data.json 加载失败:', e);
    document.getElementById('src-info').textContent =
      `数据源：localStorage 本地（progress_data.json 未加载：${e.message}）`;
  }
}

function updateOverviewCards() {
  OVERVIEW_GROUPS.forEach(g => {
    const id = g.id;
    const agg = CAT_STATS[id] || { total: 0, attempted: 0, passed: 0, wrong: 0 };

    // 该 group 覆盖的 categories 下所有 KP 状态聚合
    const cats = DATA.filter(c => g.cats.includes(c.id));
    let kpDone = 0, kpPartial = 0, kpWeak = 0, kpTotal = 0;
    cats.forEach(c => c.sections.forEach(sec => sec.kps.forEach(kp => {
      const k = makeKey(kp);
      const st = getStatus(k);
      kpTotal++;
      if (st === 'done') kpDone++;
      else if (st === 'partial') kpPartial++;
      if (getWeak(k)) kpWeak++;
    })));

    const pct = agg.total > 0
      ? Math.round(agg.passed / agg.total * 100)
      : (kpTotal > 0 ? Math.round((kpDone + kpPartial * 0.5) / kpTotal * 100) : 0);

    document.getElementById(`pct-${id}`).textContent = pct + '%';
    document.getElementById(`cnt-${id}`).textContent =
      agg.total > 0 ? `${agg.passed}/${agg.total} 题` : `${kpTotal} KP`;
    document.getElementById(`bar-${id}`).style.width = pct + '%';

    document.getElementById(`meta-${id}-kp`).textContent = `${kpTotal} KP`;
    document.getElementById(`meta-${id}-att`).textContent =
      agg.total > 0 ? `已练 ${agg.attempted}` : '—';
    document.getElementById(`meta-${id}-weak`).textContent =
      (agg.wrong > 0 || kpWeak > 0) ? `⚠ ${agg.wrong + kpWeak}` : '';
  });
}

// ============ Render ============
function render() {
  const container = document.getElementById('main-cols');
  container.innerHTML = '';

  DATA.forEach(col => {
    const colDiv = document.createElement('div');
    colDiv.className = 'col ' + col.cls;

    const header = document.createElement('div');
    header.className = 'col-header';
    header.innerHTML = `
      <div class="col-dot"></div>
      <div class="col-title">${col.label}</div>
      <div class="col-count">${col.q_total} 题 · ${col.kp_total} KP</div>
    `;
    colDiv.appendChild(header);

    col.sections.forEach(sec => {
      const secDiv = document.createElement('div');
      secDiv.className = 'section';

      const secLabel = document.createElement('div');
      secLabel.className = 'section-label';
      secLabel.innerHTML = `
        <span>${sec.code} ${sec.label}</span>
        <span class="sec-q-sum">${sec.q_total} 题</span>
      `;
      secDiv.appendChild(secLabel);

      let visible = 0;
      sec.kps.forEach(kp => {
        const key = makeKey(kp);
        const status = getStatus(key);
        const weak = getWeak(key);
        const isManual = !!(getState()[key]?.status_manual);

        if (CURRENT_FILTER === 'untouched' && status !== 'untouched') return;
        if (CURRENT_FILTER === 'partial'   && status !== 'partial')   return;
        if (CURRENT_FILTER === 'done'      && status !== 'done')      return;
        if (CURRENT_FILTER === 'weak'      && !weak) return;

        visible++;
        const item = document.createElement('div');
        item.className = 'item';
        item.dataset.status = status;
        item.dataset.weak = weak ? 'true' : 'false';
        item.dataset.key = key;
        item.title = `${kp.tag}  ·  ${kp.desc}`;

        const qCnt = kp.q_count;
        const qBadge = qCnt > 0
          ? `<span class="q-badge">${qCnt}</span>`
          : `<span class="q-badge q-zero">0</span>`;
        const srcTag = isManual ? 'M' : (qCnt > 0 ? 'A' : '');
        item.innerHTML = `
          <div class="item-dot"></div>
          <div class="item-code">${kp.code}</div>
          <div class="item-text">${kp.name}</div>
          ${qBadge}
          <div class="item-weak">弱</div>
          <div class="item-src" title="${isManual ? '手动覆盖' : '自动派生'}">${srcTag}</div>
        `;

        item.addEventListener('click', () => {
          if (item._dblTimer) { clearTimeout(item._dblTimer); item._dblTimer = null; return; }
          item._dblTimer = setTimeout(() => {
            item._dblTimer = null;
            const ns = cycleStatus(key);
            item.dataset.status = ns;
            item.querySelector('.item-src').textContent = 'M';
            item.querySelector('.item-src').title = '手动覆盖';
            updateStats();
          }, 220);
        });
        item.addEventListener('dblclick', e => {
          e.preventDefault();
          if (item._dblTimer) { clearTimeout(item._dblTimer); item._dblTimer = null; }
          const w = toggleWeak(key);
          item.dataset.weak = w ? 'true' : 'false';
          updateStats();
        });

        secDiv.appendChild(item);
      });

      if (visible > 0) colDiv.appendChild(secDiv);
    });

    container.appendChild(colDiv);
  });

  updateStats();
}

// ============ 统计 ============
// 顶部卡片用 updateOverviewCards 单独算（混合题级数据 + KP 级数据）
// 总完成率：题级（passed/total）跨大类汇总；没题库数据时退回 KP 维度
function updateStats() {
  updateOverviewCards();

  let totQ = 0, totPassed = 0;
  Object.values(CAT_STATS || {}).forEach(a => {
    totQ      += a.total || 0;
    totPassed += a.passed || 0;
  });

  let tp = 0;
  if (totQ > 0) {
    tp = Math.round(totPassed / totQ * 100);
  } else {
    // 退回 KP 维度
    let kpTotal = 0, kpDone = 0;
    DATA.forEach(cat => cat.sections.forEach(sec => sec.kps.forEach(kp => {
      const k = makeKey(kp);
      const st = getStatus(k);
      kpTotal++;
      if (st === 'done') kpDone++;
      else if (st === 'partial') kpDone += 0.5;
    })));
    tp = kpTotal ? Math.round(kpDone / kpTotal * 100) : 0;
  }
  document.getElementById('total-pct').textContent = tp + '%';
}

// ============ Filter 按钮 ============
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    CURRENT_FILTER = btn.dataset.filter;
    render();
  });
});

// ============ 主题切换 ============
function applyTheme(mode) {
  if (mode === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  else document.documentElement.removeAttribute('data-theme');
  localStorage.setItem(THEME_KEY, mode);
  document.getElementById('theme-toggle').textContent = mode === 'dark' ? '☀' : '◐';
}
document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = localStorage.getItem(THEME_KEY) || 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
});
applyTheme(localStorage.getItem(THEME_KEY) || 'light');

// ============ 重置 ============
document.getElementById('reset-link').addEventListener('click', (e) => {
  e.preventDefault();
  if (confirm('清空本地手动覆盖（自动派生不受影响）？')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
});

// ============ Init ============
(async () => {
  try {
    await loadOutline();
  } catch (e) {
    document.getElementById('main-cols').innerHTML =
      `<div style="padding:20px;color:var(--weak)">outline.json 加载失败：${e.message}</div>`;
    return;
  }
  await loadAutoDerive();
  render();
})();
</script>
